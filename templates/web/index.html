<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ECE App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; color: #d4d4d4; font-family: monospace; }
  canvas { display: block; width: 100%; height: 100%; }
  #output { padding: 8px; white-space: pre-wrap; font-size: 14px; }
</style>
</head>
<body>
  <canvas id="app-canvas"></canvas>
  <pre id="output"></pre>

  <!-- ECE Runtime glue (no embedded WASM — loaded via fetch) -->
  <script src="ece-runtime.js"></script>

  <script>
    (async function() {
      const outputEl = document.getElementById("output");

      // Override I/O to write to the page
      ECE.io.display_string = function(len) {
        const mem = new Uint16Array(ECE.wasm.memory.buffer, 0, len);
        outputEl.textContent += String.fromCharCode(...mem);
      };
      ECE.io.display_number = function(n) {
        outputEl.textContent += String(n);
      };
      ECE.io.newline = function() {
        outputEl.textContent += "\n";
      };

      // Load WASM via fetch + instantiateStreaming
      const imports = {
        io: ECE.io,
        loader: ECE.loader,
        storage: ECE.storage,
        canvas: ECE.canvas,
        timing: ECE.timing,
        math: ECE.math,
        ffi: ECE.ffi,
        wasm_host: ECE.wasmHost
      };
      const { instance } = await WebAssembly.instantiateStreaming(
        fetch("runtime.wasm"), imports);
      ECE.wasm = instance.exports;
      const envHandle = ECE.buildGlobalEnv();

      // Boot bootstrap from fetched archive bundle
      ECE.globalEnvHandle = envHandle;
      const bootResp = await fetch("bootstrap.ecec");
      const bootText = await bootResp.text();
      ECE.loadArchiveBundle(bootText);
      ECE.wasm.mark_handles();

      async function tryLoadNativeZones() {
        try {
          const manifestResp = await fetch("app-zones.manifest", { cache: "no-store" });
          const wasmResp = await fetch("app-zones.wasm", { cache: "no-store" });
          if (!manifestResp.ok || !wasmResp.ok) return;

          ECE.wasmHost.setText("app-zones.manifest", await manifestResp.text());
          ECE.wasmHost.setBytes("app-zones.wasm", await wasmResp.arrayBuffer());
          const evalStr = ECE.wasm.env_lookup(envHandle, ECE.internSym("eval-string-last"));
          ECE.wasm.call_ece_proc(
            evalStr,
            ECE.wasm.h_cons(
              ECE.makeString("(load-native-zone-module \"app-zones.wasm\" \"app-zones.manifest\")"),
              ECE.wasm.h_nil()));
        } catch (_err) {
          return;
        }
      }

      await tryLoadNativeZones();

      // Load and execute app archive bundle
      const appResp = await fetch("app.ecec");
      const appText = await appResp.text();
      ECE.loadArchiveBundle(appText);
    })();
  </script>
</body>
</html>

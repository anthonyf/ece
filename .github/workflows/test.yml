name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      SBCL_VERSION: 2.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -L -o sbcl.tar.bz2 "https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${SBCL_VERSION}-x86-64-linux
          sudo bash install.sh
          sbcl --version

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: .fasl-cache
          key: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-${{ hashFiles('qlfile', 'qlfile.lock', 'src/*.lisp', 'ece.asd', 'primitives.def', 'src/*.scm', 'bootstrap/bootstrap.ecec') }}
          restore-keys: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-

      - name: Mark bootstrap outputs as up-to-date
        # Must run before `make bootstrap` so checkout mtimes do not force
        # regeneration of the stable bootstrap archive when the checked-in
        # outputs already match the sources.
        run: |
          sleep 1
          touch bootstrap/primitives-auto.lisp
          touch bootstrap/bootstrap.ecec

      - name: Generate bootstrap artifacts
        run: make bootstrap

      - name: Warm FASL cache
        run: |
          # Pre-compile project FASLs in a dedicated large-heap session. The
          # generated native-zone shards are expensive to compile in every
          # later SBCL process, so the runtime compiles/caches them here.
          ASDF_OUTPUT_TRANSLATIONS='(:output-translations ("'$PWD'/" "'$PWD'/.fasl-cache/") :inherit-configuration)' \
          qlot exec sbcl --dynamic-space-size 8192 --non-interactive --disable-debugger \
            --eval '(asdf:load-system :ece)' \
            --eval '(let ((manifest (asdf:system-relative-pathname :ece ".tmp/bootstrap-zones/manifest.sexp"))) (unless (probe-file manifest) (error "Missing generated native-zone manifest: ~A" manifest)))' \
            --quit

      - name: Install binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_128/binaryen-version_128-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_128/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build ece binary
        run: make ece

      - name: Upload prepared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prepared-ece
          include-hidden-files: true
          path: |
            bootstrap/primitives-auto.lisp
            bootstrap/bootstrap.ecec
            .tmp/bootstrap-zones
            wasm/runtime.wasm
            bin/ece
            share/ece

  lisp-tests:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SBCL_VERSION: 2.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -L -o sbcl.tar.bz2 "https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${SBCL_VERSION}-x86-64-linux
          sudo bash install.sh
          sbcl --version

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: .fasl-cache
          key: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-${{ hashFiles('qlfile', 'qlfile.lock', 'src/*.lisp', 'ece.asd', 'primitives.def', 'src/*.scm', 'bootstrap/bootstrap.ecec') }}
          restore-keys: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-

      - name: Download prepared artifacts
        uses: actions/download-artifact@v4
        with:
          name: prepared-ece
          path: .

      - name: Restore binary entry points
        run: |
          chmod +x bin/ece
          ln -sf ece bin/ece-repl
          ln -sf ece bin/ece-build
          ln -sf ece bin/ece-test
          ln -sf ece bin/ece-serve

      - name: Run Lisp tests
        run: |
          make test-rove
          make test-ece
          make test-conformance
          make test-golden

  wasm-tests:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SBCL_VERSION: 2.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -L -o sbcl.tar.bz2 "https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${SBCL_VERSION}-x86-64-linux
          sudo bash install.sh
          sbcl --version

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: .fasl-cache
          key: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-${{ hashFiles('qlfile', 'qlfile.lock', 'src/*.lisp', 'ece.asd', 'primitives.def', 'src/*.scm', 'bootstrap/bootstrap.ecec') }}
          restore-keys: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-

      - name: Download prepared artifacts
        uses: actions/download-artifact@v4
        with:
          name: prepared-ece
          path: .

      - name: Restore binary entry points
        run: |
          chmod +x bin/ece
          ln -sf ece bin/ece-repl
          ln -sf ece bin/ece-build
          ln -sf ece bin/ece-test
          ln -sf ece bin/ece-serve

      - name: Install binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_128/binaryen-version_128-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_128/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run WASM tests
        run: make test-wasm

  web-tests:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      SBCL_VERSION: 2.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -L -o sbcl.tar.bz2 "https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${SBCL_VERSION}-x86-64-linux
          sudo bash install.sh
          sbcl --version

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: .fasl-cache
          key: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-${{ hashFiles('qlfile', 'qlfile.lock', 'src/*.lisp', 'ece.asd', 'primitives.def', 'src/*.scm', 'bootstrap/bootstrap.ecec') }}
          restore-keys: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-

      - name: Download prepared artifacts
        uses: actions/download-artifact@v4
        with:
          name: prepared-ece
          path: .

      - name: Restore binary entry points
        run: |
          chmod +x bin/ece
          ln -sf ece bin/ece-repl
          ln -sf ece bin/ece-build
          ln -sf ece bin/ece-test
          ln -sf ece bin/ece-serve

      - name: Install binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_128/binaryen-version_128-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_128/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run web tests
        run: |
          make test-web-server
          make test-web-apps
          make test-ece-serve-live

  test:
    runs-on: ubuntu-latest
    needs:
      - lisp-tests
      - wasm-tests
      - web-tests
    if: ${{ always() }}

    steps:
      - name: Confirm split test jobs passed
        run: |
          echo "lisp-tests: ${{ needs.lisp-tests.result }}"
          echo "wasm-tests: ${{ needs.wasm-tests.result }}"
          echo "web-tests: ${{ needs.web-tests.result }}"
          test "${{ needs.lisp-tests.result }}" = "success"
          test "${{ needs.wasm-tests.result }}" = "success"
          test "${{ needs.web-tests.result }}" = "success"

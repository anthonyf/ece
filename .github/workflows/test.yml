name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SBCL_VERSION: 2.6.3

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          curl -L -o sbcl.tar.bz2 "https://downloads.sourceforge.net/project/sbcl/sbcl/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd sbcl-${SBCL_VERSION}-x86-64-linux
          sudo bash install.sh
          sbcl --version

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: .fasl-cache
          key: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-${{ hashFiles('qlfile', 'qlfile.lock', 'src/*.lisp', 'ece.asd', 'primitives.def', 'src/*.scm', 'bootstrap/bootstrap.ecec') }}
          restore-keys: fasl-v3-${{ runner.os }}-${{ runner.arch }}-sbcl-${{ env.SBCL_VERSION }}-

      - name: Mark bootstrap outputs as up-to-date
        # Must run before `make bootstrap` so checkout mtimes do not force
        # regeneration of the stable bootstrap archive when the checked-in
        # outputs already match the sources.
        run: |
          sleep 1
          touch bootstrap/primitives-auto.lisp
          touch bootstrap/bootstrap.ecec

      - name: Generate bootstrap artifacts
        run: make bootstrap

      - name: Warm FASL cache
        run: |
          # Pre-compile project FASLs in a dedicated large-heap session. The
          # generated native-zone bundle is expensive to source-load in every
          # later SBCL process, but it compiles successfully in this 8GB warmup.
          ASDF_OUTPUT_TRANSLATIONS='(:output-translations ("'$PWD'/" "'$PWD'/.fasl-cache/") :inherit-configuration)' \
          qlot exec sbcl --dynamic-space-size 8192 --non-interactive --disable-debugger \
            --eval '(asdf:load-system :ece)' \
            --eval '(let* ((src (asdf:system-relative-pathname :ece ".tmp/bootstrap-zones/bootstrap-zones.lisp")) (zone-dir (asdf:system-relative-pathname :ece ".tmp/bootstrap-zones/")) (fasl-dir (asdf:apply-output-translations zone-dir)) (out (merge-pathnames (make-pathname :type "fasl" :defaults (file-namestring src)) fasl-dir))) (unless (probe-file src) (error "Missing generated native-zone bundle: ~A" src)) (ensure-directories-exist out) (when (or (not (probe-file out)) (> (file-write-date src) (file-write-date out))) (compile-file src :output-file out :print nil)))' \
            --quit

      - name: Install binaryen
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_128/binaryen-version_128-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_128/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build ece binary
        run: make ece

      - name: Run all tests
        run: make test

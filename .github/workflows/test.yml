name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Install qlot
        run: |
          curl -L https://qlot.tech/installer | bash
          echo "$HOME/.qlot/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: qlot install

      - name: Run tests
        run: qlot exec sbcl --eval '(asdf:test-system :ece)' --quit
